<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>배합 단가 산출</title>
  <style>
    :root {
      --blue: #1565c0;
      --blue-light: #e3f0ff;
      --green: #2e7d32;
      --green-light: #e8f5e9;
      --orange: #e65100;
      --orange-light: #fff3e0;
      --gray: #546e7a;
      --border: #e0e0e0;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #212121;
      --muted: #757575;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      padding-bottom: 50px;
    }

    /* ─── Header ─── */
    header {
      background: var(--blue);
      color: white;
      padding: 14px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    header p  { font-size: 11px; opacity: 0.75; margin-top: 2px; }
    .reset-btn {
      padding: 5px 12px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 20px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .reset-btn:active { background: rgba(255,255,255,0.3); }

    .wrap { padding: 12px; }

    /* ─── Tabs ─── */
    .tab-bar {
      display: flex;
      background: var(--card);
      position: sticky;
      top: 56px;
      z-index: 9;
      border-radius: 12px 12px 0 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      letter-spacing: -0.2px;
    }
    .tab-btn:nth-child(1).active { color: var(--blue);  border-bottom-color: var(--blue);  background: var(--blue-light); }
    .tab-btn:nth-child(2).active { color: var(--green); border-bottom-color: var(--green); background: var(--green-light); }

    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ─── Cards ─── */
    .card {
      background: var(--card);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.09);
    }
    .card.top { border-radius: 0 0 12px 12px; margin-bottom: 12px; }
    .card.mid { border-radius: 12px; margin-bottom: 12px; }

    .card-head {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-head.gray { background: var(--gray); }
    .card-head small { font-size: 11px; font-weight: 400; opacity: 0.8; }

    /* ─── Table ─── */
    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: #f5f7ff;
      padding: 7px 4px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 5px 3px;
      border-bottom: 1px solid #f5f5f5;
      vertical-align: middle;
    }
    td.lbl { font-size: 12px; padding-left: 12px; white-space: nowrap; }
    td.val { text-align: right; padding-right: 8px; font-size: 12px; font-weight: 600; color: var(--muted); }
    td.val.hi { color: var(--blue); }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 6px 5px;
      font-size: 12px;
      text-align: right;
      background: #fafafa;
      color: var(--text);
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="text"] { text-align: left; font-size: 11px; }
    input:focus { outline: none; border-color: var(--blue); background: #fff; }

    /* delete btn */
    .del-btn {
      display: flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; margin: 0 auto;
      background: #ffebee; border: none; border-radius: 50%;
      color: #c62828; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .del-btn:active { background: #c62828; color: #fff; }

    /* Row variants */
    tr.r-sub td       { background: #f0f4ff; }
    tr.r-sub td.lbl   { font-weight: 700; color: var(--blue); }
    tr.r-sub td.val   { color: var(--blue); }

    tr.r-total td     { background: #dce8ff; }
    tr.r-total td.lbl { font-weight: 700; font-size: 13px; color: var(--blue); }
    tr.r-total td.val { font-size: 13px; font-weight: 700; color: var(--blue); }

    tr.r-delivery td     { background: var(--green-light); }
    tr.r-delivery td.lbl { font-weight: 700; color: var(--green); }

    tr.r-profit td     { background: var(--orange-light); }
    tr.r-profit td.lbl { font-weight: 700; color: var(--orange); }
    tr.r-profit td.val { font-size: 14px; }

    tr.r-shared td     { background: #fff8e1; }
    tr.r-shared td.lbl { font-weight: 700; color: #f57f17; }

    .warn {
      display: none; font-size: 11px; color: #c62828;
      padding: 4px 12px; background: #ffebee;
    }
    .warn.on { display: block; }

    .add-btn {
      display: block; width: calc(100% - 24px); margin: 8px 12px;
      padding: 9px; background: none; border: 1.5px dashed var(--border);
      border-radius: 8px; font-size: 13px; font-weight: 600;
      color: var(--muted); cursor: pointer;
    }
    .add-btn:active { border-color: var(--blue); color: var(--blue); }

    .hint { font-size: 10px; color: #9e9e9e; padding: 3px 12px 4px; }

    /* ─── Comparison ─── */
    .sec-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      letter-spacing: 0.5px; text-transform: uppercase; padding: 4px 2px 6px;
    }
    .cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .cmp-box {
      background: var(--card); border-radius: 10px; padding: 12px 10px;
      text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .cmp-box .clabel { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .cmp-box .cvalue { font-size: 17px; font-weight: 700; line-height: 1.2; }
    .cmp-box .csub   { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .cmp-box.blue  .cvalue { color: var(--blue); }
    .cmp-box.green .cvalue { color: var(--green); }
    .cmp-box.orange .cvalue { color: var(--orange); }
    .diff-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 20px; margin-top: 4px;
    }
    .diff-badge.pos  { background: #e8f5e9; color: var(--green); }
    .diff-badge.neg  { background: #ffebee; color: #c62828; }
    .diff-badge.zero { background: #f5f5f5; color: var(--muted); }

    /* ─── Print ─── */
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      @page { size: A4; margin: 8mm; }

      body { background: white; padding-bottom: 0; font-size: 10px; }

      header { position: static; box-shadow: none; padding: 4px 10px; }
      header h1 { font-size: 13px; }
      header p  { font-size: 9px; }
      .reset-btn { display: none; }

      .tab-bar { position: static; box-shadow: none; border-radius: 0; }
      .tab-btn  { padding: 6px 4px; font-size: 11px; }

      .wrap { padding: 6px; }

      .add-btn { display: none; }
      .del-btn { display: none; }
      .warn    { display: none !important; }
      .hint    { display: none; }

      .card { box-shadow: none; border: 1px solid #e0e0e0; margin-bottom: 6px !important; }

      thead th  { padding: 4px 3px; font-size: 10px; }
      tbody td  { padding: 3px 2px; }
      td.lbl    { font-size: 10px; }
      td.val    { font-size: 10px; }

      .cmp-box .cvalue { font-size: 13px; }
      .cmp-grid { gap: 5px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>배합 단가 산출</h1>
    <button class="reset-btn" onclick="resetAll()">초기화</button>
  </div>
  <p>단위: 톤 &nbsp;|&nbsp; 금액 단위: 원/톤</p>
</header>

<div class="wrap">

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(1)">① 기본배합</button>
    <button class="tab-btn"        onclick="switchTab(2)">② 출하배합</button>
  </div>

  <!-- ① -->
  <div class="tab-pane active" id="pane1">
    <div class="card top">
      <table>
        <thead><tr>
          <th style="width:30%">원 료 명</th>
          <th style="width:22%">단 가</th>
          <th style="width:17%">배합%</th>
          <th style="width:22%">금 액</th>
          <th style="width:9%"></th>
        </tr></thead>
        <tbody id="mat1"></tbody>
      </table>
      <button class="add-btn" onclick="addMaterial()">＋ 원료 추가</button>
      <div class="warn" id="warn1">⚠ 배합% 합계가 100%가 아닙니다</div>
      <table><tbody>
        <tr class="r-sub">
          <td class="lbl" colspan="2">소계</td>
          <td class="val" id="s1_pct" style="font-size:11px">-</td>
          <td class="val hi" id="s1_sub">-</td>
          <td></td>
        </tr>
        <tr class="r-total">
          <td class="lbl" colspan="2">합계</td>
          <td></td>
          <td class="val" id="s1_total">-</td>
          <td></td>
        </tr>
        <tr class="r-profit">
          <td class="lbl" colspan="2">매출이익</td>
          <td></td>
          <td class="val" id="s1_profit">-</td>
          <td></td>
        </tr>
      </tbody></table>
      <div class="hint" id="s1_hint"></div>
    </div>
  </div>

  <!-- ② -->
  <div class="tab-pane" id="pane2">
    <div class="card top">
      <table>
        <thead><tr>
          <th style="width:30%">원 료 명</th>
          <th style="width:22%">단 가</th>
          <th style="width:17%">배합%</th>
          <th style="width:22%">금 액</th>
          <th style="width:9%"></th>
        </tr></thead>
        <tbody id="mat2"></tbody>
      </table>
      <button class="add-btn" onclick="addMaterial()">＋ 원료 추가</button>
      <div class="warn" id="warn2">⚠ 배합% 합계가 100%가 아닙니다</div>
      <table><tbody>
        <tr class="r-sub">
          <td class="lbl" colspan="2">소계</td>
          <td class="val" id="s2_pct" style="font-size:11px">-</td>
          <td class="val hi" id="s2_sub">-</td>
          <td></td>
        </tr>
        <tr class="r-total">
          <td class="lbl" colspan="2">합계</td>
          <td></td>
          <td class="val" id="s2_total">-</td>
          <td></td>
        </tr>
        <tr class="r-profit">
          <td class="lbl" colspan="2">매출이익</td>
          <td></td>
          <td class="val" id="s2_profit">-</td>
          <td></td>
        </tr>
      </tbody></table>
      <div class="hint" id="s2_hint"></div>
    </div>
  </div>

  <!-- 공통 비용 -->
  <div class="card mid">
    <div class="card-head gray">
      <span>공통 비용 / 납품</span>
      <small>①② 동일 적용</small>
    </div>
    <table><tbody>
      <tr>
        <td class="lbl" style="width:50%">임가공비</td>
        <td><input type="text" id="proc" placeholder="0" inputmode="numeric" onfocus="stripInputOnFocus(this)" onblur="formatInputOnBlur(this)" oninput="calc()"></td>
      </tr>
      <tr>
        <td class="lbl">톤백자재비</td>
        <td><input type="text" id="bag" placeholder="0" inputmode="numeric" onfocus="stripInputOnFocus(this)" onblur="formatInputOnBlur(this)" oninput="calc()"></td>
      </tr>
      <tr>
        <td class="lbl">운반비</td>
        <td><input type="text" id="trans" placeholder="0" inputmode="numeric" onfocus="stripInputOnFocus(this)" onblur="formatInputOnBlur(this)" oninput="calc()"></td>
      </tr>
      <tr class="r-shared">
        <td class="lbl">추가운반비</td>
        <td><input type="text" id="extra" placeholder="0" inputmode="numeric" onfocus="stripInputOnFocus(this)" onblur="formatInputOnBlur(this)" oninput="calc()"></td>
      </tr>
      <tr class="r-delivery">
        <td class="lbl">납품단가</td>
        <td><input type="text" id="del" placeholder="직접 입력" inputmode="numeric" onfocus="stripInputOnFocus(this)" onblur="formatInputOnBlur(this)" oninput="calc()"></td>
      </tr>
    </tbody></table>
  </div>

  <!-- 비교 요약 -->
  <div class="sec-title">— 비교 요약 —</div>
  <div class="cmp-grid">
    <div class="cmp-box blue">
      <div class="clabel">① BCT 기본배합 원가</div>
      <div class="cvalue" id="c1_total">-</div>
      <div class="csub">원/톤</div>
    </div>
    <div class="cmp-box green">
      <div class="clabel">② BCT 출하배합 원가</div>
      <div class="cvalue" id="c2_total">-</div>
      <div class="csub">원/톤</div>
      <div id="cost_diff"></div>
    </div>
    <div class="cmp-box orange">
      <div class="clabel">① BCT 기본배합 매출이익</div>
      <div class="cvalue" id="c1_profit">-</div>
      <div class="csub" id="c1_margin">-</div>
    </div>
    <div class="cmp-box orange">
      <div class="clabel">② BCT 출하배합 매출이익</div>
      <div class="cvalue" id="c2_profit">-</div>
      <div class="csub" id="c2_margin">-</div>
    </div>
  </div>

</div>

<script>
const INIT_ROWS = [
  '포틀랜드시멘트',
  '고로슬래그미분말',
  '천연무수석고',
  '탈황석고',
  '플라이애시_EP',
  '플라이애시',
];

let rows = INIT_ROWS.map(name => ({ name, price: '', r1: '', r2: '' }));

function fmt(n) {
  if (n == null || isNaN(n) || n === 0) return '-';
  return Math.round(n).toLocaleString('ko-KR');
}

function parseNum(v) {
  return parseFloat(String(v || '').replace(/,/g, '')) || 0;
}

function fmtInput(v) {
  const n = parseFloat(String(v || '').replace(/,/g, ''));
  return (n && !isNaN(n)) ? Math.round(n).toLocaleString('ko-KR') : '';
}

function formatInputOnBlur(el) {
  el.value = fmtInput(el.value);
}

function stripInputOnFocus(el) {
  const n = parseFloat(String(el.value).replace(/,/g, ''));
  el.value = (n && !isNaN(n)) ? String(Math.round(n)) : '';
}

function saveValues() {
  rows.forEach((row, i) => {
    const n1 = document.getElementById(`r_name1_${i}`);
    const p1 = document.getElementById(`r_price1_${i}`);
    const r1 = document.getElementById(`r_ratio1_${i}`);
    const r2 = document.getElementById(`r_ratio2_${i}`);
    if (n1) row.name  = n1.value;
    if (p1) row.price = String(p1.value).replace(/,/g, '');
    if (r1) row.r1    = r1.value;
    if (r2) row.r2    = r2.value;
  });
}

function renderRows() {
  ['mat1', 'mat2'].forEach((tbodyId, ti) => {
    const sn   = ti === 0 ? '1' : '2';
    const rKey = ti === 0 ? 'r1' : 'r2';
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = '';
    rows.forEach((row, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td style="padding:4px 3px 4px 5px">
           <input type="text" id="r_name${sn}_${i}" value="${row.name}" placeholder="원료명"
             oninput="syncShared('name',${i},this.value)">
         </td>
         <td style="padding:4px 3px">
           <input type="text" id="r_price${sn}_${i}" value="${fmtInput(row.price)}" placeholder="0"
             inputmode="numeric"
             onfocus="stripInputOnFocus(this)"
             onblur="formatInputOnBlur(this)"
             oninput="syncShared('price',${i},this.value.replace(/,/g,''))">
         </td>
         <td style="padding:4px 3px">
           <input type="number" id="r_ratio${sn}_${i}" value="${row[rKey]}" placeholder="0"
             inputmode="decimal" oninput="calc()">
         </td>
         <td class="val hi" id="r_amt${sn}_${i}" style="min-width:56px">-</td>
         <td style="padding:3px 4px 3px 0; text-align:center">
           <button class="del-btn" onclick="deleteMaterial(${i})">✕</button>
         </td>`;
      tbody.appendChild(tr);
    });
  });
}

function syncShared(field, i, val) {
  rows[i][field] = val;
  const other = field === 'name'
    ? (document.getElementById(`r_name1_${i}`) === document.activeElement
        ? document.getElementById(`r_name2_${i}`)
        : document.getElementById(`r_name1_${i}`))
    : (document.getElementById(`r_price1_${i}`) === document.activeElement
        ? document.getElementById(`r_price2_${i}`)
        : document.getElementById(`r_price1_${i}`));
  if (other && other !== document.activeElement) {
    other.value = field === 'price' ? fmtInput(val) : val;
  }
  calc();
}

function addMaterial() {
  saveValues();
  rows.push({ name: '', price: '', r1: '', r2: '' });
  renderRows();
  calc();
}

function deleteMaterial(i) {
  saveValues();
  rows.splice(i, 1);
  renderRows();
  calc();
}

function calcSection(s) {
  const sn   = s === 's1' ? '1' : '2';
  const rKey = s === 's1' ? 'r1' : 'r2';
  let sumR = 0, sumA = 0;

  rows.forEach((row, i) => {
    const price = parseNum(row.price);
    const ratioEl = document.getElementById(`r_ratio${sn}_${i}`);
    const ratio = parseFloat(ratioEl != null ? ratioEl.value : row[rKey]) || 0;
    const amt   = price * ratio / 100;
    sumR += ratio;
    sumA += amt;
    const el = document.getElementById(`r_amt${sn}_${i}`);
    if (el) el.textContent = amt > 0 ? fmt(amt) : '-';
  });

  document.getElementById(`${s}_pct`).textContent = sumR > 0 ? sumR.toFixed(1) + '%' : '-';
  document.getElementById(`${s}_sub`).textContent = sumA > 0 ? fmt(sumA) : '-';

  document.getElementById(`warn${sn}`).classList.toggle('on', sumR > 0 && Math.abs(sumR - 100) > 0.05);

  // 공통 비용
  const proc  = parseNum(document.getElementById('proc')?.value);
  const bag   = parseNum(document.getElementById('bag')?.value);
  const trans = parseNum(document.getElementById('trans')?.value);
  const total = sumA + proc + bag + trans;

  document.getElementById(`${s}_total`).textContent = total > 0 ? fmt(total) : '-';

  // 납품단가 힌트
  const extra = parseNum(document.getElementById('extra')?.value);
  const del   = parseNum(document.getElementById('del')?.value);
  const hintEl = document.getElementById(`${s}_hint`);
  hintEl.textContent = (total > 0 && extra > 0)
    ? `납품단가 참고: ${fmt(total)} + ${fmt(extra)} = ${fmt(total + extra)}`
    : '';

  const profit = del > 0 ? del - total : null;
  const profEl = document.getElementById(`${s}_profit`);
  if (profit !== null) {
    profEl.textContent = fmt(profit);
    profEl.style.color = profit >= 0 ? 'var(--orange)' : '#c62828';
  } else {
    profEl.textContent = '-';
    profEl.style.color = 'var(--muted)';
  }

  return { total, del, profit };
}

function calc() {
  const r1 = calcSection('s1');
  const r2 = calcSection('s2');

  document.getElementById('c1_total').textContent = r1.total > 0 ? fmt(r1.total) : '-';
  document.getElementById('c2_total').textContent = r2.total > 0 ? fmt(r2.total) : '-';

  const diffEl = document.getElementById('cost_diff');
  if (r1.total > 0 && r2.total > 0) {
    const diff = r2.total - r1.total;
    const cls  = diff < 0 ? 'pos' : diff > 0 ? 'neg' : 'zero';
    diffEl.innerHTML = `<span class="diff-badge ${cls}">${diff > 0 ? '+' : ''}${fmt(diff)}</span>`;
  } else {
    diffEl.innerHTML = '';
  }

  function setProfit(id, midId, profit, del) {
    document.getElementById(id).textContent = profit !== null ? fmt(profit) : '-';
    document.getElementById(id).style.color = (profit !== null && profit < 0) ? '#c62828' : 'var(--orange)';
    document.getElementById(midId).textContent =
      (profit !== null && del > 0) ? `이익률 ${(profit / del * 100).toFixed(1)}%` : '-';
  }
  setProfit('c1_profit', 'c1_margin', r1.profit, r1.del);
  setProfit('c2_profit', 'c2_margin', r2.profit, r2.del);
}

function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === n - 1));
  document.querySelectorAll('.tab-pane').forEach((p, i) => p.classList.toggle('active', i === n - 1));
}

function resetAll() {
  if (!confirm('모든 입력값을 초기화할까요?')) return;
  rows = INIT_ROWS.map(name => ({ name, price: '', r1: '', r2: '' }));
  renderRows();
  ['proc','bag','trans','extra','del'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  switchTab(1);
  calc();
}

renderRows();
calc();
</script>
</body>
